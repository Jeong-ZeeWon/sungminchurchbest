name: One-off update Friday worship schedule

on:
  push:
    paths:
      - '.github/workflows/update-friday-schedule.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-friday-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch index.html Friday data
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          new_friday = """const fridayData = [
            { date:'2026-05-15', title:'세상에 답이었던 교회와 성도',        passage:'행 3:1-10',    preacher:'이은호 목사(얼바인샤이닝휄로우십교회)', worship:'윤수신', pd:'정지원', caption:'박정인', prayer:'박정인 정지원 김은형' },
            { date:'2026-05-22', title:'에벤에셀, 부흥과 그 이후의 삶',      passage:'삼상 7:12-17', worship:'정지원', pd:'노태규', caption:'윤수신', prayer:'최명환 노태규 윤수신' },
            { date:'2026-05-29', title:'부흥 이후의 위기',                    passage:'삼상 8:1-9',   worship:'정지원', pd:'윤수신', caption:'박정인', prayer:'박정인 윤수신 김은형' },
            { date:'2026-06-05', title:'우리에게 왕을 주소서',                passage:'삼상 8:10-18', worship:'윤수신', pd:'박정인', caption:'정지원', prayer:'민꿈 교역자' },
            { date:'2026-06-12', title:'그들이 듣지 아니하고',               passage:'삼상 8:19-22', worship:'정지원', pd:'윤수신', caption:'노태규', prayer:'최명환 노태규 윤수신' },
            { date:'2026-06-19', title:'찾으러 갔다가 부름받다',             passage:'삼상 9:1-14',  worship:'윤수신', pd:'정지원', caption:'박정인', prayer:'박정인 정지원 김은형' },
            { date:'2026-06-26', title:'하나님은 이미 준비하고 계셨다',      passage:'삼상 9:15-21', worship:'정지원', pd:'노태규', caption:'윤수신', prayer:'최명환 노태규 윤수신' },
            { date:'2026-07-03', title:'만남, 하나님의 뜻이 시작되는 순간',  passage:'삼상 9:22-27', worship:'미정', pd:'미정', caption:'미정', prayer:'미정' },
          ];"""

          text = re.sub(
              r"const fridayData = \[.*?\];\n\n// ── 큐티 본문",
              new_friday + "\n\n// ── 큐티 본문",
              text,
              flags=re.S,
          )

          text = text.replace(
              "<div class=\"svc-extra\">찬양 ${s.worship}</div>",
              "<div class=\"svc-extra\">${s.preacher ? '강사 ' + s.preacher : '찬양 ' + s.worship}</div>"
          )

          old = """  } else {
            const tags = data.prayer.split(' ').map(p =>
              `<span class=\"p-tag\" style=\"background:var(${colorBg});color:var(${color});border:1px solid var(${colorLight})\">${p}</span>`
            ).join('');
            staffHtml = `<div class=\"detail-sec\">
              <div class=\"sec-label\">예배 담당자</div>
              <div class=\"staff-grid\">
                <div class=\"staff-row\"><span class=\"s-role\">찬양</span><span class=\"s-name\">${data.worship}</span></div>
                <div class=\"staff-row\"><span class=\"s-role\">PD</span><span class=\"s-name\">${data.pd}</span></div>
                <div class=\"staff-row\"><span class=\"s-role\">자막</span><span class=\"s-name\">${data.caption}</span></div>
              </div>
              <div style=\"margin-top:10px\">
                <div class=\"sec-label\">기도용사</div>
                <div class=\"prayer-tags\">${tags}</div>
              </div>
            </div>`;
          }"""

          new = """  } else {
            const tags = data.prayer.split(' ').map(p =>
              `<span class=\"p-tag\" style=\"background:var(${colorBg});color:var(${color});border:1px solid var(${colorLight})\">${p}</span>`
            ).join('');
            const preacherRow = data.preacher
              ? `<div class=\"staff-row\"><span class=\"s-role\">강사</span><span class=\"s-name\">${data.preacher}</span></div>`
              : '';
            staffHtml = `<div class=\"detail-sec\">
              <div class=\"sec-label\">예배 담당자</div>
              <div class=\"staff-grid\">
                ${preacherRow}
                <div class=\"staff-row\"><span class=\"s-role\">찬양</span><span class=\"s-name\">${data.worship}</span></div>
                <div class=\"staff-row\"><span class=\"s-role\">PD</span><span class=\"s-name\">${data.pd}</span></div>
                <div class=\"staff-row\"><span class=\"s-role\">자막</span><span class=\"s-name\">${data.caption}</span></div>
              </div>
              <div style=\"margin-top:10px\">
                <div class=\"sec-label\">기도용사</div>
                <div class=\"prayer-tags\">${tags}</div>
              </div>
            </div>`;
          }"""

          if old not in text:
              raise SystemExit('target detail block not found')
          text = text.replace(old, new)

          updater = Path('.github/workflows/update-friday-schedule.yml')
          if updater.exists():
              updater.unlink()

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/update-friday-schedule.yml
          git diff --staged --quiet || git commit -m "금요성령집회 일정 조정"
          git push

