name: 한 주간 예배 담당자 업데이트

on:
  schedule:
    - cron: '0 0 * * 6'  # 매주 토요일 09:00 KST (UTC 00:00)
  workflow_dispatch:      # 수동 실행 가능

jobs:
  update-worship:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests

      - name: worship.html 업데이트
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python scripts/update_worship.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add worship.html
          git diff --staged --quiet || git commit -m "자동 업데이트: $(TZ=Asia/Seoul date +'%Y-%m-%d') 한 주간 예배 담당자"
          git push
