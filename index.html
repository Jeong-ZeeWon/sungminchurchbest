<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✝️ 매일의 향기</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:      #D4687A;
      --rose-light:#F5C0C9;
      --rose-bg:   #FFF0F2;
      --lavender:  #9B8EC4;
      --lav-light: #DDD6F3;
      --lav-bg:    #F5F0FF;
      --sage:      #6FAF7B;
      --sage-light:#C5E6CC;
      --cream:     #FFF8F2;
      --warm:      #FFF2E8;
      --text:      #3A2626;
      --text-mid:  #6B4848;
      --text-soft: #A07878;
      --white:     #FFFFFF;
      --shadow:    0 4px 20px rgba(180,100,100,.10);
      --shadow-lg: 0 8px 40px rgba(180,100,100,.15);
      --radius:    20px;
      --radius-sm: 12px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(160deg, #FFF4EE 0%, #FFF0F4 50%, #F8F0FF 100%);
      min-height: 100vh;
      color: var(--text);
    }

    /* ── HEADER ───────────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,248,245,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(212,104,122,.12);
      padding: 16px 20px 12px;
    }
    .header-inner { max-width: 680px; margin: 0 auto; }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 28px; }
    .logo-text h1 { font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 700; color: var(--rose); line-height: 1.2; }
    .logo-text span { font-size: 11px; color: var(--text-soft); letter-spacing: .5px; }
    .today-badge {
      background: var(--rose-bg);
      border: 1px solid var(--rose-light);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px; color: var(--rose); font-weight: 500;
      text-align: right;
    }

    /* ── CALENDAR STRIP ───────────────────────────── */
    .calendar-wrap {
      max-width: 680px; margin: 0 auto;
      padding: 16px 20px 0;
    }
    .calendar-month {
      font-size: 13px; font-weight: 700; color: var(--text-mid);
      margin-bottom: 10px; letter-spacing: .5px;
    }
    .calendar-scroll {
      display: flex; gap: 6px;
      overflow-x: auto;
      padding-bottom: 10px;
      scrollbar-width: none;
    }
    .calendar-scroll::-webkit-scrollbar { display: none; }
    .cal-day {
      flex: 0 0 46px;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      padding: 8px 0;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all .2s;
      border: 2px solid transparent;
    }
    .cal-day:hover { background: var(--rose-bg); }
    .cal-day.has-entry { cursor: pointer; }
    .cal-day.no-entry { opacity: .35; cursor: default; pointer-events: none; }
    .cal-day.selected {
      background: var(--rose);
      border-color: var(--rose);
    }
    .cal-day.today-marker .cal-num::after {
      content: '';
      display: block; width: 4px; height: 4px;
      background: var(--rose); border-radius: 50%;
      margin: 2px auto 0;
    }
    .cal-day.selected .cal-num::after { background: white; }
    .cal-dow { font-size: 10px; color: var(--text-soft); font-weight: 500; }
    .cal-day.selected .cal-dow { color: rgba(255,255,255,.8); }
    .cal-day.sun .cal-dow { color: var(--rose-light); }
    .cal-num { font-size: 15px; font-weight: 700; color: var(--text); }
    .cal-day.selected .cal-num { color: white; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--rose-light); }
    .cal-day.selected .cal-dot { background: rgba(255,255,255,.6); }

    /* ── MAIN CARD ────────────────────────────────── */
    .main { max-width: 680px; margin: 0 auto; padding: 20px 20px 60px; }

    /* nav arrows */
    .nav-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .nav-btn {
      background: white;
      border: 1px solid var(--rose-light);
      border-radius: 50px;
      padding: 8px 18px;
      font-size: 13px; font-weight: 500;
      color: var(--rose);
      cursor: pointer;
      transition: all .2s;
      display: flex; align-items: center; gap: 6px;
    }
    .nav-btn:hover { background: var(--rose-bg); transform: translateY(-1px); }
    .nav-btn:disabled { opacity: .3; pointer-events: none; }
    .nav-label { font-size: 13px; color: var(--text-soft); }

    /* card */
    .card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      animation: slideUp .4s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* card header */
    .card-header {
      background: linear-gradient(135deg, #FDDDE6 0%, #F9E4F8 50%, #E8E0FF 100%);
      padding: 28px 28px 24px;
      position: relative; overflow: hidden;
    }
    .card-header::before {
      content: '🌸';
      position: absolute; top: -10px; right: 20px;
      font-size: 80px; opacity: .12; transform: rotate(-15deg);
    }
    .card-header::after {
      content: '✿';
      position: absolute; bottom: -8px; left: 12px;
      font-size: 60px; opacity: .10; transform: rotate(10deg);
    }
    .card-date { font-size: 13px; color: var(--text-soft); margin-bottom: 6px; font-weight: 500; }
    .card-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 26px; font-weight: 700;
      color: var(--rose);
      margin-bottom: 14px;
      line-height: 1.3;
    }
    .badges { display: flex; flex-wrap: wrap; gap: 8px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px; font-weight: 600;
      letter-spacing: .3px;
    }
    .badge-bible {
      background: var(--lav-bg);
      color: var(--lavender);
      border: 1px solid var(--lav-light);
    }
    .badge-day {
      background: #FFF8E0;
      color: #B8952A;
      border: 1px solid #F3E3A0;
    }

    /* card body */
    .card-body { padding: 24px 28px; }

    .greeting {
      font-size: 14px; color: var(--text-mid);
      line-height: 1.8; margin-bottom: 20px;
      padding: 14px 18px;
      background: linear-gradient(135deg, var(--warm), var(--rose-bg));
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--rose-light);
    }
    .greeting strong { color: var(--rose); }

    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      color: var(--text-soft); text-transform: uppercase;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, var(--rose-light), transparent);
    }

    /* prayer */
    .prayer-box {
      background: linear-gradient(135deg, #FFF5F7 0%, #F9F0FF 100%);
      border: 1px solid var(--rose-light);
      border-radius: var(--radius-sm);
      padding: 20px 22px;
      margin-bottom: 24px;
      position: relative;
    }
    .prayer-box::before {
      content: '🙏';
      position: absolute; top: -14px; left: 18px;
      font-size: 24px;
      background: white; padding: 0 6px;
      border-radius: 50%;
    }
    .prayer-text {
      font-family: 'Noto Serif KR', serif;
      font-size: 15px; line-height: 2;
      color: var(--text);
      font-weight: 400;
    }

    /* action buttons */
    .actions { display: flex; flex-direction: column; gap: 10px; }
    .action-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all .2s;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .action-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.10); }
    .action-btn .btn-icon { font-size: 20px; flex-shrink: 0; }
    .btn-info { text-align: left; }
    .btn-label { font-size: 13px; font-weight: 700; display: block; }
    .btn-sub { font-size: 11px; opacity: .75; display: block; margin-top: 1px; }

    .btn-dawn { background: linear-gradient(135deg, #FFE8EA, #FFDDE8); color: #C0455C; }
    .btn-reading { background: linear-gradient(135deg, #E8F0FF, #DDE8FF); color: #4060B0; }
    .btn-drama { background: linear-gradient(135deg, #E8FFF0, #DDFFF0); color: #357A5A; }
    .btn-notion { background: linear-gradient(135deg, #F0F0F0, #E8E8E8); color: #555; }

    /* sunday card */
    .sunday-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 28px;
      text-align: center;
      animation: slideUp .4s ease;
    }
    .sunday-icon { font-size: 56px; margin-bottom: 16px; }
    .sunday-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 22px; font-weight: 700;
      color: var(--rose); margin-bottom: 10px;
    }
    .sunday-text { font-size: 14px; color: var(--text-soft); line-height: 1.8; }

    /* footer */
    .footer {
      text-align: center; padding: 20px;
      font-size: 12px; color: var(--text-soft);
    }
    .footer a { color: var(--rose); text-decoration: none; }

    /* responsive */
    @media (max-width: 480px) {
      .card-header { padding: 22px 20px 18px; }
      .card-body { padding: 18px 20px; }
      .card-title { font-size: 22px; }
      .prayer-text { font-size: 14px; }
    }
  </style>
</head>

const entryByDate = {};
devotionals.forEach(d => { entryByDate[d.date] = d; });

const today = new Date();
const todayStr = today.toISOString().slice(0, 10);

let selectedDate = todayStr;
if (!entryByDate[selectedDate]) {
  const past = devotionals.filter(d => d.date <= todayStr);
  selectedDate = past.length ? past[past.length - 1].date : devotionals[0].date;
}

function buildCalendar() {
  const scroll = document.getElementById('calendarScroll');
  scroll.innerHTML = '';
  for (let day = 1; day <= 31; day++) {
    const dateStr = `2026-05-${String(day).padStart(2, '0')}`;
    const dt = new Date(dateStr);
    if (dt.getMonth() !== 4) continue;
    const dowIdx = dt.getDay();
    const hasEntry = !!entryByDate[dateStr];
    const isSun = dowIdx === 0;
    const isToday = dateStr === todayStr;
    const isSelected = dateStr === selectedDate;

    const el = document.createElement('div');
    el.className = 'cal-day' +
      (hasEntry ? ' has-entry' : ' no-entry') +
      (isSun ? ' sun' : '') +
      (isSelected ? ' selected' : '') +
      (isToday ? ' today-marker' : '');
    el.dataset.date = dateStr;
    el.innerHTML = `
      <span class="cal-dow">${DAYS[dowIdx]}</span>
      <span class="cal-num">${day}</span>
      ${hasEntry ? '<span class="cal-dot"></span>' : '<span class="cal-dot" style="opacity:0"></span>'}
    `;
    if (hasEntry) el.onclick = () => selectDate(dateStr);
    scroll.appendChild(el);
  }
  scrollToSelected();
}

function scrollToSelected() {
  const scroll = document.getElementById('calendarScroll');
  const sel = scroll.querySelector('.selected');
  if (sel) sel.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function selectDate(dateStr) {
  selectedDate = dateStr;
  renderCard();
  buildCalendar();
  updateNav();
}

function navigate(dir) {
  const dates = devotionals.map(d => d.date);
  const idx = dates.indexOf(selectedDate);
  const next = idx + dir;
  if (next >= 0 && next < dates.length) selectDate(dates[next]);
}

function updateNav() {
  const dates = devotionals.map(d => d.date);
  const idx = dates.indexOf(selectedDate);
  document.getElementById('prevBtn').disabled = idx <= 0;
  document.getElementById('nextBtn').disabled = idx >= dates.length - 1;
  const d = entryByDate[selectedDate];
  if (d) {
    const dayNum = parseInt(selectedDate.slice(8), 10);
    document.getElementById('navLabel').textContent = `${dayNum}일 (${d.dow}) · ${d.readingDay}일차`;
  }
}

function renderCard() {
  const area = document.getElementById('cardArea');
  const d = entryByDate[selectedDate];
  if (!d) {
    const dayNum = parseInt(selectedDate.slice(8), 10);
    area.innerHTML = `
      <div class="sunday-card">
        <div class="sunday-icon">⛪</div>
        <div class="sunday-title">주일입니다</div>
        <div class="sunday-text">
          오늘 ${dayNum}일은 주일입니다.<br>
          새벽기도회와 성경통독 대신<br>
          온 마음으로 주일 예배를 드리세요 🙏<br><br>
          <a href="https://www.notion.so/2df5e604d8c68153b64dc76accb69102" target="_blank" style="color:var(--rose);font-weight:600;">노션에서 예배 정보 보기 →</a>
        </div>
      </div>`;
    return;
  }

  const [, , dd] = d.date.split('-');
  area.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-date">🌸 2026년 5월 ${parseInt(dd)}일 ${d.dow}요일</div>
        <div class="card-title">오늘의 매일의 향기</div>
        <div class="badges">
          <span class="badge badge-bible">📖 ${d.biblePassage}</span>
          <span class="badge badge-day">🕐 ${d.readingDay}일차 · 통독 ${d.readingNum}장</span>
        </div>
      </div>
      <div class="card-body">
        <div class="greeting">
          <strong>✝ 매일의 향기</strong><br>${d.greeting}
        </div>

        <div class="section-label">📜 오늘의 기도</div>
        <div class="prayer-box">
          <p class="prayer-text">${d.prayer}</p>
        </div>

        <div class="section-label">🎬 오늘의 영상</div>
        <div class="actions">
          <a href="${d.dawnUrl}" target="_blank" class="action-btn btn-dawn">
            <span class="btn-icon">🌅</span>
            <div class="btn-info">
              <span class="btn-label">새벽기도회</span>
              <span class="btn-sub">성민교회 유튜브 재생목록</span>
            </div>
            <span style="margin-left:auto;font-size:18px;">›</span>
          </a>
          <a href="${d.readingUrl}" target="_blank" class="action-btn btn-reading">
            <span class="btn-icon">📗</span>
            <div class="btn-info">
              <span class="btn-label">90일 성경통독</span>
              <span class="btn-sub">${d.readingRange}</span>
            </div>
            <span style="margin-left:auto;font-size:18px;">›</span>
          </a>
          <a href="${d.dramaUrl}" target="_blank" class="action-btn btn-drama">
            <span class="btn-icon">🎧</span>
            <div class="btn-info">
              <span class="btn-label">드라마바이블 (천천히 읽기)</span>
              <span class="btn-sub">낭독 음원으로 듣기</span>
            </div>
            <span style="margin-left:auto;font-size:18px;">›</span>
          </a>
          <a href="${d.notionUrl}" target="_blank" class="action-btn btn-notion">
            <span class="btn-icon">📋</span>
            <div class="btn-info">
              <span class="btn-label">노션에서 원본 보기</span>
              <span class="btn-sub">성민교회 노션 워크스페이스</span>
            </div>
            <span style="margin-left:auto;font-size:18px;">›</span>
          </a>
        </div>
      </div>
    </div>`;
}

function init() {
  const nowDay = today.getDate();
  const nowMonth = today.getMonth() + 1;
  const label = nowMonth === 5 ? `오늘 ${nowDay}일` : today.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' });
  document.getElementById('todayBadge').innerHTML = `📅 ${label}`;
  buildCalendar();
  renderCard();
  updateNav();
}

init();
</script>
