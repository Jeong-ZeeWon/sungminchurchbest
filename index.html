<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>성민교회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #F7F3EE;
      --white:      #FFFFFF;
      --text:       #1E1410;
      --text-mid:   #5A3C28;
      --text-soft:  #9A7860;
      --border:     #EAD8C8;
      --radius:     16px;
      --radius-sm:  10px;
      --shadow:     0 2px 12px rgba(0,0,0,.07);
      --shadow-lg:  0 6px 28px rgba(0,0,0,.12);

      --sun:        #C4841C;
      --sun-bg:     #FFF9EE;
      --sun-light:  #F5D888;
      --wed:        #2A7A90;
      --wed-bg:     #EBF7FB;
      --wed-light:  #90CEDE;
      --fri:        #B83C28;
      --fri-bg:     #FFF1EE;
      --fri-light:  #F0AE9C;
      --qt:         #A04070;
      --qt-bg:      #FEF0F6;
      --qt-light:   #EDB0CC;
      --ldr:        #3C7850;
      --ldr-bg:     #EDF8F1;
      --ldr-light:  #9ED4B0;
    }

    html, body { margin: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); }

    /* ── APP SHELL ── */
    #app { width: 100%; }

    .app-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center;
      padding: 12px 18px 10px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 6px rgba(0,0,0,.06);
      min-height: 58px; gap: 4px;
    }
    .back-btn {
      display: none; align-items: center; justify-content: center;
      width: 38px; height: 38px; flex-shrink: 0;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 50%; font-size: 20px; color: var(--text-mid);
      cursor: pointer; margin-right: 6px;
    }
    .back-btn.visible { display: flex; }
    .header-inner { flex: 1; min-width: 0; }
    .header-title { font-family: 'Noto Serif KR', serif; font-size: 17px; font-weight: 700; color: var(--text); }
    .header-sub { font-size: 11px; color: var(--text-soft); margin-top: 1px; }

    /* ── SCREENS ── */
    .screen-wrap { position: fixed; top: 58px; left: 0; right: 0; bottom: 0; overflow: hidden; }
    .screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      background: var(--bg);
      transform: translateX(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      will-change: transform;
    }
    .screen.active  { transform: translateX(0); }
    .screen.behind  { transform: translateX(-30%); }
    #s-home { transform: translateX(0); }

    /* ── HOME ── */
    .home-wrap { padding: 22px 16px 36px; max-width: 500px; margin: 0 auto; }
    .home-hero { text-align: center; margin-bottom: 28px; }
    .hero-icon { font-size: 44px; margin-bottom: 8px; }
    .hero-church { font-family: 'Noto Serif KR', serif; font-size: 28px; font-weight: 700; letter-spacing: -.5px; }
    .hero-date { font-size: 12px; color: var(--text-soft); margin-top: 5px; }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .menu-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 18px 15px 16px;
      cursor: pointer; transition: transform .14s, box-shadow .14s;
      border: 2px solid transparent;
      -webkit-tap-highlight-color: transparent;
      text-align: left;
    }
    .menu-card:active { transform: scale(.96); box-shadow: var(--shadow); }
    .menu-card.full { grid-column: 1 / -1; }
    .menu-card .m-icon { font-size: 30px; margin-bottom: 9px; display: block; }
    .menu-card .m-title { font-family: 'Noto Serif KR', serif; font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .menu-card .m-desc { font-size: 11px; color: var(--text-soft); line-height: 1.5; }
    .menu-card .m-badge {
      display: inline-block; margin-top: 9px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 10px; font-weight: 700;
    }
    .card-sun { border-color: var(--sun-light); }
    .card-sun .m-title { color: var(--sun); }
    .card-sun .m-badge { background: var(--sun-bg); color: var(--sun); }
    .card-wed { border-color: var(--wed-light); }
    .card-wed .m-title { color: var(--wed); }
    .card-wed .m-badge { background: var(--wed-bg); color: var(--wed); }
    .card-fri { border-color: var(--fri-light); }
    .card-fri .m-title { color: var(--fri); }
    .card-fri .m-badge { background: var(--fri-bg); color: var(--fri); }
    .card-qt { border-color: var(--qt-light); }
    .card-qt .m-title { color: var(--qt); }
    .card-qt .m-badge { background: var(--qt-bg); color: var(--qt); }
    .card-ldr { border-color: var(--ldr-light); }
    .card-ldr .m-title { color: var(--ldr); }
    .card-ldr .m-badge { background: var(--ldr-bg); color: var(--ldr); }

    /* ── LIST SCREEN ── */
    .list-wrap { padding: 20px 16px 36px; max-width: 500px; margin: 0 auto; }
    .list-head { margin-bottom: 18px; }
    .list-icon { font-size: 30px; margin-bottom: 6px; display: block; }
    .list-head h2 { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 700; margin-bottom: 3px; }
    .list-desc { font-size: 12px; color: var(--text-soft); }
    .theme-box {
      background: var(--white); border-radius: var(--radius-sm);
      border-left: 3px solid; padding: 12px 14px;
      margin-bottom: 16px; font-size: 12px; color: var(--text-mid); line-height: 1.7;
    }
    .svc-item {
      background: var(--white); border-radius: var(--radius-sm);
      box-shadow: var(--shadow); margin-bottom: 9px;
      padding: 14px 15px; cursor: pointer;
      display: flex; align-items: center; gap: 13px;
      transition: transform .13s;
      -webkit-tap-highlight-color: transparent;
    }
    .svc-item:active { transform: scale(.98); }
    .svc-item.is-now { border-left: 4px solid; }
    .svc-item.is-past { opacity: .6; }
    .svc-date { text-align: center; min-width: 42px; }
    .svc-date .s-m { font-size: 10px; color: var(--text-soft); font-weight: 500; }
    .svc-date .s-d { font-size: 26px; font-weight: 700; line-height: 1; }
    .svc-date .s-w { font-size: 10px; color: var(--text-soft); }
    .svc-body { flex: 1; min-width: 0; }
    .svc-title { font-size: 14px; font-weight: 700; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .svc-passage { font-size: 12px; color: var(--text-mid); }
    .svc-extra { font-size: 11px; color: var(--text-soft); margin-top: 2px; }
    .svc-arr { color: var(--text-soft); font-size: 18px; flex-shrink: 0; }
    .now-badge {
      font-size: 9px; font-weight: 700; letter-spacing: .5px;
      padding: 2px 7px; border-radius: 10px; margin-left: 6px;
      vertical-align: middle;
    }

    /* ── DETAIL SCREEN ── */
    .detail-wrap { padding: 20px 16px 40px; max-width: 500px; margin: 0 auto; }
    .detail-hero {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow-lg); padding: 22px 20px 20px;
      margin-bottom: 14px; position: relative; overflow: hidden;
    }
    .detail-hero::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    }
    .detail-date { font-size: 12px; color: var(--text-soft); margin-bottom: 6px; }
    .detail-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 22px; font-weight: 700; line-height: 1.4; margin-bottom: 12px;
    }
    .passage-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 600;
    }
    .detail-sec {
      background: var(--white); border-radius: var(--radius-sm);
      box-shadow: var(--shadow); padding: 15px 17px; margin-bottom: 12px;
    }
    .sec-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--text-soft);
      margin-bottom: 11px; display: flex; align-items: center; gap: 8px;
    }
    .sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .staff-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid var(--border);
    }
    .staff-row:last-child { border-bottom: none; }
    .s-role { font-size: 11px; color: var(--text-soft); min-width: 64px; }
    .s-name { font-size: 14px; font-weight: 600; }
    .prayer-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
    .p-tag {
      padding: 4px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
    }
    .no-staff { font-size: 12px; color: var(--text-soft); padding: 6px 0; }

    /* ── QT SCREEN ── */
    .qt-header {
      background: var(--white); position: sticky; top: 0; z-index: 10;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 6px rgba(0,0,0,.06);
      padding: 14px 18px 10px;
    }
    .qt-month { font-size: 12px; font-weight: 700; color: var(--text-mid); margin-bottom: 8px; }
    .qt-cal {
      display: flex; gap: 5px; overflow-x: auto;
      padding-bottom: 6px; scrollbar-width: none;
    }
    .qt-cal::-webkit-scrollbar { display: none; }
    .cal-day {
      flex: 0 0 44px; display: flex; flex-direction: column;
      align-items: center; gap: 3px; padding: 7px 0;
      border-radius: 10px; cursor: pointer; transition: all .15s;
      border: 2px solid transparent;
    }
    .cal-day.no-entry { opacity: .3; pointer-events: none; }
    .cal-day.selected { background: var(--qt); border-color: var(--qt); }
    .cal-day.today-mark .c-num::after {
      content: ''; display: block; width: 4px; height: 4px;
      background: var(--qt); border-radius: 50%; margin: 2px auto 0;
    }
    .cal-day.selected .c-num::after { background: white; }
    .c-dow { font-size: 9px; color: var(--text-soft); font-weight: 500; }
    .cal-day.selected .c-dow { color: rgba(255,255,255,.8); }
    .c-num { font-size: 14px; font-weight: 700; }
    .cal-day.selected .c-num { color: white; }
    .c-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--qt-light); }
    .cal-day.selected .c-dot { background: rgba(255,255,255,.5); }

    .qt-body { padding: 16px 16px 40px; max-width: 500px; margin: 0 auto; }
    .qt-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .qt-nav-btn {
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 7px 16px;
      font-size: 12px; font-weight: 600; color: var(--qt);
      cursor: pointer; transition: background .14s;
    }
    .qt-nav-btn:disabled { opacity: .3; pointer-events: none; }
    .qt-nav-lbl { font-size: 12px; color: var(--text-soft); }

    .qt-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-lg); overflow: hidden; animation: fadeUp .3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .qt-card-head {
      background: linear-gradient(135deg, #FDE8F5 0%, #F8E0FF 50%, #E8E0FF 100%);
      padding: 22px 20px 18px; position: relative; overflow: hidden;
    }
    .qt-card-head::before {
      content: '🌸'; position: absolute; top: -8px; right: 14px;
      font-size: 72px; opacity: .1; transform: rotate(-12deg);
    }
    .qc-date { font-size: 12px; color: var(--text-soft); margin-bottom: 4px; }
    .qc-title { font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 700; color: var(--qt); margin-bottom: 12px; line-height: 1.3; }
    .qc-badges { display: flex; flex-wrap: wrap; gap: 7px; }
    .qc-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 16px; font-size: 11px; font-weight: 600;
    }
    .qc-badge.bible { background: #F0EAF8; color: var(--qt); border: 1px solid var(--qt-light); }
    .qc-badge.day   { background: #FFF5D8; color: #A07010; border: 1px solid #F0DC80; }
    .qt-card-body { padding: 18px 20px; }
    .qt-greeting {
      font-size: 13px; color: var(--text-mid); line-height: 1.85;
      margin-bottom: 16px; padding: 12px 14px;
      background: linear-gradient(135deg, #FFF8F0, var(--qt-bg));
      border-radius: var(--radius-sm); border-left: 3px solid var(--qt-light);
    }
    .qt-prayer-box {
      background: linear-gradient(135deg, #FEF5F9, #F8F0FF);
      border: 1px solid var(--qt-light); border-radius: var(--radius-sm);
      padding: 18px 20px; margin-bottom: 18px; position: relative;
    }
    .qt-prayer-box::before {
      content: '🙏'; position: absolute; top: -12px; left: 14px;
      font-size: 22px; background: white; padding: 0 5px; border-radius: 50%;
    }
    .qt-prayer-text {
      font-family: 'Noto Serif KR', serif;
      font-size: 14px; line-height: 2; color: var(--text);
    }
    .qt-links { display: flex; flex-direction: column; gap: 8px; }
    .qt-link {
      display: flex; align-items: center; gap: 11px;
      padding: 12px 15px; border-radius: var(--radius-sm);
      text-decoration: none; transition: transform .14s; border: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .qt-link:active { transform: scale(.98); }
    .qt-link .l-icon { font-size: 18px; flex-shrink: 0; }
    .qt-link .l-info { text-align: left; flex: 1; }
    .qt-link .l-lbl { font-size: 12px; font-weight: 700; display: block; }
    .qt-link .l-sub { font-size: 10px; opacity: .75; display: block; margin-top: 1px; }
    .qt-link .l-arr { font-size: 16px; margin-left: auto; }
    .qt-link.dawn    { background: linear-gradient(135deg, #FFE8EA, #FFDDE8); color: #B0405A; }
    .qt-link.reading { background: linear-gradient(135deg, #E8EEFF, #DDE8FF); color: #4060A8; }
    .qt-link.drama   { background: linear-gradient(135deg, #E8FFF0, #DDFFF0); color: #306850; }
    .qt-link.notion  { background: linear-gradient(135deg, #F0F0F0, #E8E8E8); color: #555; }
    .qt-sunday-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 44px 24px;
      text-align: center;
    }
    .qt-sunday-card .sc-icon { font-size: 48px; margin-bottom: 14px; }
    .qt-sunday-card .sc-title { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 700; color: var(--qt); margin-bottom: 8px; }
    .qt-sunday-card .sc-text { font-size: 13px; color: var(--text-soft); line-height: 1.8; }

    /* ── LEADERS SCREEN ── */
    .ldr-wrap { padding: 20px 16px 36px; max-width: 500px; margin: 0 auto; }
    .ldr-head { margin-bottom: 16px; }
    .ldr-week-badge {
      display: inline-block; background: var(--ldr); color: white;
      font-size: 10px; font-weight: 700; padding: 4px 12px;
      border-radius: 20px; margin-bottom: 10px; letter-spacing: .5px;
    }
    .ldr-head h2 { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 700; margin-bottom: 3px; }
    .ldr-head .ldr-sub { font-size: 12px; color: var(--text-soft); }
    .ldr-section { background: var(--white); border-radius: var(--radius-sm); box-shadow: var(--shadow); margin-bottom: 12px; overflow: hidden; }
    .ldr-sec-head {
      padding: 12px 16px 10px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .ldr-sec-head .sh-icon { font-size: 20px; }
    .ldr-sec-head .sh-title { font-size: 14px; font-weight: 700; }
    .ldr-sec-head .sh-date { font-size: 11px; color: var(--text-soft); margin-left: auto; }
    .ldr-sec-body { padding: 10px 16px 14px; }
    .ldr-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px dashed var(--border);
    }
    .ldr-row:last-child { border-bottom: none; }
    .lr-role { font-size: 11px; color: var(--text-soft); min-width: 52px; padding-top: 1px; }
    .lr-val { font-size: 13px; font-weight: 600; text-align: right; flex: 1; }
    .ldr-tags { display: flex; flex-wrap: wrap; gap: 5px; justify-content: flex-end; }
    .ldr-tag {
      padding: 3px 9px; border-radius: 14px; font-size: 11px; font-weight: 600;
      background: var(--ldr-bg); color: var(--ldr); border: 1px solid var(--ldr-light);
    }
    .ldr-dawn-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .ldr-dawn-table th {
      background: var(--ldr); color: white; padding: 7px 4px;
      text-align: center; font-weight: 600; font-size: 11px;
    }
    .ldr-dawn-table td { padding: 7px 4px; text-align: center; border-bottom: 1px solid var(--border); }
    .ldr-dawn-table tr:last-child td { border-bottom: none; }
    .ldr-dawn-table tr:nth-child(even) td { background: var(--ldr-bg); }
    .ldr-dawn-table .role-cell { font-size: 10px; font-weight: 700; color: var(--text-soft); background: #F5F5F5 !important; }
    .ldr-link-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px; background: var(--ldr); color: white;
      border-radius: var(--radius-sm); font-size: 14px; font-weight: 700;
      text-decoration: none; margin-top: 4px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── COLORS APPLIED ── */
    .sun-color  { color: var(--sun); }
    .wed-color  { color: var(--wed); }
    .fri-color  { color: var(--fri); }
    .qt-color   { color: var(--qt); }
    .ldr-color  { color: var(--ldr); }

    @media (max-width: 360px) {
      .menu-grid { gap: 9px; }
      .menu-card { padding: 15px 12px; }
      .menu-card .m-icon { font-size: 26px; }
      .menu-card .m-title { font-size: 13px; }
      .detail-title { font-size: 19px; }
      .qt-card-head { padding: 18px 16px 14px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── HEADER ── -->
  <header class="app-header" id="appHeader">
    <button class="back-btn" id="backBtn" onclick="goBack()">‹</button>
    <div class="header-inner">
      <div class="header-title" id="hTitle">✝ 성민교회</div>
      <div class="header-sub"  id="hSub">매일의 향기</div>
    </div>
  </header>

  <!-- ── SCREENS ── -->
  <div class="screen-wrap">

    <!-- HOME -->
    <div class="screen" id="s-home">
      <div class="home-wrap">
        <div class="home-hero">
          <div class="hero-icon">⛪</div>
          <div class="hero-church">성민교회</div>
          <div class="hero-date" id="heroDate"></div>
        </div>
        <div class="menu-grid">
          <div class="menu-card card-sun" onclick="goTo('sunday')">
            <span class="m-icon">☀️</span>
            <div class="m-title">주일예배</div>
            <div class="m-desc">이번 주 말씀 본문과<br>설교 제목, 담당자</div>
            <span class="m-badge">요한복음 강해</span>
          </div>
          <div class="menu-card card-wed" onclick="goTo('wednesday')">
            <span class="m-icon">🕊</span>
            <div class="m-title">수요예배</div>
            <div class="m-desc">SBA 성서학 강의 일정과<br>담당자</div>
            <span class="m-badge">성서학 과정3</span>
          </div>
          <div class="menu-card card-fri" onclick="goTo('friday')">
            <span class="m-icon">🔥</span>
            <div class="m-title">금요성령집회</div>
            <div class="m-desc">본문, 제목, 찬양·PD<br>기도용사 담당자</div>
            <span class="m-badge">사무엘상 강해</span>
          </div>
          <div class="menu-card card-qt" onclick="goTo('qt')">
            <span class="m-icon">📖</span>
            <div class="m-title">매일의 향기</div>
            <div class="m-desc">매일 큐티 본문과 기도,<br>90일 성경통독</div>
            <span class="m-badge">큐티 · 통독</span>
          </div>
          <div class="menu-card card-ldr full" onclick="goTo('leaders')">
            <span class="m-icon">👥</span>
            <div class="m-title">한 주간 예배 담당자</div>
            <div class="m-desc">이번 주 새벽·수요·금요 예배를 섬기는 분들</div>
            <span class="m-badge">매주 자동 업데이트</span>
          </div>
        </div>
      </div>

const stack = [];
const todayStr = new Date().toISOString().slice(0,10);

function goTo(id) {
  const prev = stack.length ? stack[stack.length-1] : 'home';
  const prevEl = document.getElementById('s-' + prev);
  const nextEl = document.getElementById('s-' + id);

  prevEl.classList.add('behind');
  nextEl.classList.add('active');
  stack.push(id);
  updateHeader(id);

  // Render on first visit
  const fn = renderers[id];
  if (fn && !nextEl.dataset.rendered) { fn(); nextEl.dataset.rendered = '1'; }
}

function goBack() {
  if (!stack.length) return;
  const cur = stack.pop();
  const prev = stack.length ? stack[stack.length-1] : 'home';
  document.getElementById('s-' + cur).classList.remove('active');
  document.getElementById('s-' + prev).classList.remove('behind');
  updateHeader(prev);
}

function dateInfo(dateStr) {
  const d = new Date(dateStr);
  return { m: d.getMonth()+1, day: d.getDate(), dow: KDOW[d.getDay()] };
}

function isPast(dateStr)  { return dateStr < todayStr; }
function isNow(dateStr)   {
  const d = new Date(dateStr); const t = new Date(todayStr);
  return Math.abs(d - t) < 7 * 86400000;
}

const qtMap = {};
devotionals.forEach(d => { qtMap[d.date] = d; });
let qtSel = todayStr;
if (!qtMap[qtSel]) {
  const past = devotionals.filter(d => d.date <= todayStr);
  qtSel = past.length ? past[past.length-1].date : devotionals[0].date;
}

function buildQTCal() {
  const cal = document.getElementById('qtCal');
  cal.innerHTML = '';
  for (let day = 1; day <= 31; day++) {
    const ds = `2026-05-${String(day).padStart(2,'0')}`;
    const dt = new Date(ds);
    if (dt.getMonth() !== 4) continue;
    const hasEntry = !!qtMap[ds];
    const isSun = dt.getDay() === 0;
    const isToday = ds === todayStr;
    const isSel = ds === qtSel;
    const el = document.createElement('div');
    el.className = 'cal-day' +
      (hasEntry ? '' : ' no-entry') +
      (isSel ? ' selected' : '') +
      (isToday ? ' today-mark' : '');
    el.innerHTML = `
      <span class="c-dow" style="${isSun?'color:var(--qt-light)':''}">"${KDOW[dt.getDay()]}</span>
      <span class="c-num">${day}</span>
      ${hasEntry ? '<span class="c-dot"></span>' : '<span class="c-dot" style="opacity:0"></span>'}`;
    if (hasEntry) el.onclick = () => { qtSel = ds; buildQTCal(); renderQTCard(); updateQTNav(); };
    cal.appendChild(el);
  }
  const sel = cal.querySelector('.selected');
  if (sel) sel.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}

function qtNav(dir) {
  const dates = devotionals.map(d => d.date);
  const idx = dates.indexOf(qtSel) + dir;
  if (idx >= 0 && idx < dates.length) { qtSel = dates[idx]; buildQTCal(); renderQTCard(); updateQTNav(); }
}

function updateQTNav() {
  const dates = devotionals.map(d => d.date);
  const idx = dates.indexOf(qtSel);
  document.getElementById('qtPrev').disabled = idx <= 0;
  document.getElementById('qtNext').disabled = idx >= dates.length - 1;
  const d = qtMap[qtSel];
  if (d) document.getElementById('qtNavLbl').textContent = `${parseInt(qtSel.slice(8))}일 (${d.dow}) · ${d.day}일차`;
}

function renderQTCard() {
  const area = document.getElementById('qtCard');
  const d = qtMap[qtSel];
  const dayNum = parseInt(qtSel.slice(8));
  if (!d) {
    area.innerHTML = `
      <div class="qt-sunday-card">
        <div class="sc-icon">⛪</div>
        <div class="sc-title">주일입니다</div>
        <div class="sc-text">오늘 ${dayNum}일은 주일입니다.<br>온 마음으로 주일 예배를 드리세요 🙏</div>
      </div>`;
    return;
  }
  area.innerHTML = `
    <div class="qt-card">

  const today = new Date();
  const m = today.getMonth() + 1;
  const d = today.getDate();
  const dow = KDOW[today.getDay()];
  document.getElementById('heroDate').textContent = `${today.getFullYear()}년 ${m}월 ${d}일 (${dow})`;

  buildQTCal();
  renderQTCard();
  updateQTNav();
}

init();

    function fixWrap(){
      var h = document.getElementById('appHeader').offsetHeight;
      document.querySelector('.screen-wrap').style.top = h + 'px';
    }
    fixWrap();
    window.addEventListener('resize', fixWrap);
    window.addEventListener('orientationchange', function(){ setTimeout(fixWrap,200); });
