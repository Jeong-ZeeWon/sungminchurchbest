<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>성민교회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #F7F3EE;
      --white:      #FFFFFF;
      --text:       #1E1410;
      --text-mid:   #5A3C28;
      --text-soft:  #9A7860;
      --border:     #EAD8C8;
      --radius:     16px;
      --radius-sm:  10px;
      --shadow:     0 2px 12px rgba(0,0,0,.07);
      --shadow-lg:  0 6px 28px rgba(0,0,0,.12);

      --sun:        #C4841C;
      --sun-bg:     #FFF9EE;
      --sun-light:  #F5D888;
      --wed:        #2A7A90;
      --wed-bg:     #EBF7FB;
      --wed-light:  #90CEDE;
      --fri:        #B83C28;
      --fri-bg:     #FFF1EE;
      --fri-light:  #F0AE9C;
      --qt:         #A04070;
      --qt-bg:      #FEF0F6;
      --qt-light:   #EDB0CC;
      --ldr:        #3C7850;
      --ldr-bg:     #EDF8F1;
      --ldr-light:  #9ED4B0;
    }

    html, body { margin: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); }

    /* ── APP SHELL ── */
    #app { width: 100%; }

    .app-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center;
      padding: 12px 18px 10px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 6px rgba(0,0,0,.06);
      min-height: 58px; gap: 4px;
    }
    .back-btn {
      display: none; align-items: center; justify-content: center;
      width: 38px; height: 38px; flex-shrink: 0;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 50%; font-size: 20px; color: var(--text-mid);
      cursor: pointer; margin-right: 6px;
    }
    .back-btn.visible { display: flex; }
    .header-inner { flex: 1; min-width: 0; }
    .header-title { font-family: 'Noto Serif KR', serif; font-size: 17px; font-weight: 700; color: var(--text); }
    .header-sub { font-size: 11px; color: var(--text-soft); margin-top: 1px; }

    /* ── SCREENS ── */
    .screen-wrap { position: fixed; top: 58px; left: 0; right: 0; bottom: 0; overflow: hidden; }
    .screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      background: var(--bg);
      transform: translateX(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      will-change: transform;
    }
    .screen.active  { transform: translateX(0); }
    .screen.behind  { transform: translateX(-30%); }
    #s-home { transform: translateX(0); }

    /* ── HOME ── */
    .home-wrap { padding: 22px 16px 36px; max-width: 500px; margin: 0 auto; }
    .home-hero { text-align: center; margin-bottom: 28px; }
    .hero-icon { font-size: 44px; margin-bottom: 8px; }
    .hero-church { font-family: 'Noto Serif KR', serif; font-size: 28px; font-weight: 700; letter-spacing: -.5px; }
    .hero-date { font-size: 12px; color: var(--text-soft); margin-top: 5px; }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .menu-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 18px 15px 16px;
      cursor: pointer; transition: transform .14s, box-shadow .14s;
      border: 2px solid transparent;
      -webkit-tap-highlight-color: transparent;
      text-align: left;
    }
    .menu-card:active { transform: scale(.96); box-shadow: var(--shadow); }
    .menu-card.full { grid-column: 1 / -1; }
    .menu-card .m-icon { font-size: 30px; margin-bottom: 9px; display: block; }
    .menu-card .m-title { font-family: 'Noto Serif KR', serif; font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .menu-card .m-desc { font-size: 11px; color: var(--text-soft); line-height: 1.5; }
    .menu-card .m-badge {
      display: inline-block; margin-top: 9px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 10px; font-weight: 700;
    }
    .card-sun { border-color: var(--sun-light); }
    .card-sun .m-title { color: var(--sun); }
    .card-sun .m-badge { background: var(--sun-bg); color: var(--sun); }
    .card-wed { border-color: var(--wed-light); }
    .card-wed .m-title { color: var(--wed); }
    .card-wed .m-badge { background: var(--wed-bg); color: var(--wed); }
    .card-fri { border-color: var(--fri-light); }
    .card-fri .m-title { color: var(--fri); }
    .card-fri .m-badge { background: var(--fri-bg); color: var(--fri); }
    .card-qt { border-color: var(--qt-light); }
    .card-qt .m-title { color: var(--qt); }
    .card-qt .m-badge { background: var(--qt-bg); color: var(--qt); }
    .card-ldr { border-color: var(--ldr-light); }
    .card-ldr .m-title { color: var(--ldr); }
    .card-ldr .m-badge { background: var(--ldr-bg); color: var(--ldr); }

    /* ── LIST SCREEN ── */
    .list-wrap { padding: 20px 16px 36px; max-width: 500px; margin: 0 auto; }
    .list-head { margin-bottom: 18px; }
    .list-icon { font-size: 30px; margin-bottom: 6px; display: block; }
    .list-head h2 { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 700; margin-bottom: 3px; }
    .list-desc { font-size: 12px; color: var(--text-soft); }
    .theme-box {
      background: var(--white); border-radius: var(--radius-sm);
      border-left: 3px solid; padding: 12px 14px;
      margin-bottom: 16px; font-size: 12px; color: var(--text-mid); line-height: 1.7;
    }
    .svc-item {
      background: var(--white); border-radius: var(--radius-sm);
      box-shadow: var(--shadow); margin-bottom: 9px;
      padding: 14px 15px; cursor: pointer;
      display: flex; align-items: center; gap: 13px;
      transition: transform .13s;
      -webkit-tap-highlight-color: transparent;
    }
    .svc-item:active { transform: scale(.98); }
    .svc-item.is-now { border-left: 4px solid; }
    .svc-item.is-past { opacity: .6; }
    .svc-date { text-align: center; min-width: 42px; }
    .svc-date .s-m { font-size: 10px; color: var(--text-soft); font-weight: 500; }
    .svc-date .s-d { font-size: 26px; font-weight: 700; line-height: 1; }
    .svc-date .s-w { font-size: 10px; color: var(--text-soft); }
    .svc-body { flex: 1; min-width: 0; }
    .svc-title { font-size: 14px; font-weight: 700; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .svc-passage { font-size: 12px; color: var(--text-mid); }
    .svc-extra { font-size: 11px; color: var(--text-soft); margin-top: 2px; }
    .svc-arr { color: var(--text-soft); font-size: 18px; flex-shrink: 0; }
    .now-badge {
      font-size: 9px; font-weight: 700; letter-spacing: .5px;
      padding: 2px 7px; border-radius: 10px; margin-left: 6px;
      vertical-align: middle;
    }

    /* ── DETAIL SCREEN ── */
    .detail-wrap { padding: 20px 16px 40px; max-width: 500px; margin: 0 auto; }
    .detail-hero {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow-lg); padding: 22px 20px 20px;
      margin-bottom: 14px; position: relative; overflow: hidden;
    }
    .detail-hero::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    }
    .detail-date { font-size: 12px; color: var(--text-soft); margin-bottom: 6px; }
    .detail-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 22px; font-weight: 700; line-height: 1.4; margin-bottom: 12px;
    }
    .passage-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 600;
    }
    .detail-sec {
      background: var(--white); border-radius: var(--radius-sm);
      box-shadow: var(--shadow); padding: 15px 17px; margin-bottom: 12px;
    }
    .sec-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--text-soft);
      margin-bottom: 11px; display: flex; align-items: center; gap: 8px;
    }
    .sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .staff-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid var(--border);
    }
    .staff-row:last-child { border-bottom: none; }
    .s-role { font-size: 11px; color: var(--text-soft); min-width: 64px; }
    .s-name { font-size: 14px; font-weight: 600; }
    .prayer-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
    .p-tag {
      padding: 4px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
    }
    .no-staff { font-size: 12px; color: var(--text-soft); padding: 6px 0; }

    /* ── QT SCREEN ── */
    .qt-header {
      background: var(--white); position: sticky; top: 0; z-index: 10;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 6px rgba(0,0,0,.06);
      padding: 14px 18px 10px;
    }
    .qt-month { font-size: 12px; font-weight: 700; color: var(--text-mid); margin-bottom: 8px; }
    .qt-cal {
      display: flex; gap: 5px; overflow-x: auto;
      padding-bottom: 6px; scrollbar-width: none;
    }
    .qt-cal::-webkit-scrollbar { display: none; }
    .cal-day {
      flex: 0 0 44px; display: flex; flex-direction: column;
      align-items: center; gap: 3px; padding: 7px 0;
      border-radius: 10px; cursor: pointer; transition: all .15s;
      border: 2px solid transparent;
    }
    .cal-day.no-entry { opacity: .3; pointer-events: none; }
    .cal-day.selected { background: var(--qt); border-color: var(--qt); }
    .cal-day.today-mark .c-num::after {
      content: ''; display: block; width: 4px; height: 4px;
      background: var(--qt); border-radius: 50%; margin: 2px auto 0;
    }
    .cal-day.selected .c-num::after { background: white; }
    .c-dow { font-size: 9px; color: var(--text-soft); font-weight: 500; }
    .cal-day.selected .c-dow { color: rgba(255,255,255,.8); }
    .c-num { font-size: 14px; font-weight: 700; }
    .cal-day.selected .c-num { color: white; }
    .c-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--qt-light); }
    .cal-day.selected .c-dot { background: rgba(255,255,255,.5); }

    .qt-body { padding: 16px 16px 40px; max-width: 500px; margin: 0 auto; }
    .qt-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .qt-nav-btn {
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 7px 16px;
      font-size: 12px; font-weight: 600; color: var(--qt);
      cursor: pointer; transition: background .14s;
    }
    .qt-nav-btn:disabled { opacity: .3; pointer-events: none; }
    .qt-nav-lbl { font-size: 12px; color: var(--text-soft); }

    .qt-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-lg); overflow: hidden; animation: fadeUp .3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .qt-card-head {
      background: linear-gradient(135deg, #FDE8F5 0%, #F8E0FF 50%, #E8E0FF 100%);
      padding: 22px 20px 18px; position: relative; overflow: hidden;
    }
    .qt-card-head::before {
      content: '🌸'; position: absolute; top: -8px; right: 14px;
      font-size: 72px; opacity: .1; transform: rotate(-12deg);
    }
    .qc-date { font-size: 12px; color: var(--text-soft); margin-bottom: 4px; }
    .qc-title { font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 700; color: var(--qt); margin-bottom: 12px; line-height: 1.3; }
    .qc-badges { display: flex; flex-wrap: wrap; gap: 7px; }
    .qc-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 16px; font-size: 11px; font-weight: 600;
    }
    .qc-badge.bible { background: #F0EAF8; color: var(--qt); border: 1px solid var(--qt-light); }
    .qc-badge.day   { background: #FFF5D8; color: #A07010; border: 1px solid #F0DC80; }
    .qt-card-body { padding: 18px 20px; }
    .qt-greeting {
      font-size: 13px; color: var(--text-mid); line-height: 1.85;
      margin-bottom: 16px; padding: 12px 14px;
      background: linear-gradient(135deg, #FFF8F0, var(--qt-bg));
      border-radius: var(--radius-sm); border-left: 3px solid var(--qt-light);
    }
    .qt-prayer-box {
      background: linear-gradient(135deg, #FEF5F9, #F8F0FF);
      border: 1px solid var(--qt-light); border-radius: var(--radius-sm);
      padding: 18px 20px; margin-bottom: 18px; position: relative;
    }
    .qt-prayer-box::before {
      content: '🙏'; position: absolute; top: -12px; left: 14px;
      font-size: 22px; background: white; padding: 0 5px; border-radius: 50%;
    }
    .qt-prayer-text {
      font-family: 'Noto Serif KR', serif;
      font-size: 14px; line-height: 2; color: var(--text);
    }
    .qt-links { display: flex; flex-direction: column; gap: 8px; }
    .qt-link {
      display: flex; align-items: center; gap: 11px;
      padding: 12px 15px; border-radius: var(--radius-sm);
      text-decoration: none; transition: transform .14s; border: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .qt-link:active { transform: scale(.98); }
    .qt-link .l-icon { font-size: 18px; flex-shrink: 0; }
    .qt-link .l-info { text-align: left; flex: 1; }
    .qt-link .l-lbl { font-size: 12px; font-weight: 700; display: block; }
    .qt-link .l-sub { font-size: 10px; opacity: .75; display: block; margin-top: 1px; }
    .qt-link .l-arr { font-size: 16px; margin-left: auto; }
    .qt-link.dawn    { background: linear-gradient(135deg, #FFE8EA, #FFDDE8); color: #B0405A; }
    .qt-link.reading { background: linear-gradient(135deg, #E8EEFF, #DDE8FF); color: #4060A8; }
    .qt-link.drama   { background: linear-gradient(135deg, #E8FFF0, #DDFFF0); color: #306850; }
    .qt-link.notion  { background: linear-gradient(135deg, #F0F0F0, #E8E8E8); color: #555; }
    .qt-sunday-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 44px 24px;
      text-align: center;
    }
    .qt-sunday-card .sc-icon { font-size: 48px; margin-bottom: 14px; }
    .qt-sunday-card .sc-title { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 700; color: var(--qt); margin-bottom: 8px; }
    .qt-sunday-card .sc-text { font-size: 13px; color: var(--text-soft); line-height: 1.8; }

    /* ── LEADERS SCREEN ── */
    .ldr2-wrap { padding: 16px 14px 36px; max-width: 600px; margin: 0 auto; }
    .ldr2-date-row { display: flex; justify-content: center; margin-bottom: 16px; }
    .ldr2-date-sticker {
      background: #FFFAED; border: 2px solid #F5C842; color: #3A2E26;
      font-size: 12px; font-weight: 700; padding: 6px 16px; border-radius: 20px;
      box-shadow: 2px 3px 0 rgba(245,200,66,.3);
    }
    .ldr2-card {
      background: var(--white); border-radius: 22px; padding: 18px 16px; margin-bottom: 12px;
      box-shadow: 0 6px 24px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
    }
    .ldr2-sec-head { display: flex; align-items: center; gap: 11px; margin-bottom: 14px; }
    .ldr2-sec-icon {
      width: 42px; height: 42px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0; box-shadow: 2px 4px 8px rgba(0,0,0,.10);
    }
    .ldr2-sec-icon.green { background: #EAF6EB; }
    .ldr2-sec-title { font-size: 15px; font-weight: 700; }
    .ldr2-sec-badge {
      margin-left: auto; font-size: 10px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px; box-shadow: 1px 2px 0 rgba(0,0,0,.07);
    }
    .ldr2-sec-badge.green { background: #EAF6EB; border: 1.5px solid #77C17E; color: #388E3C; }
    .ldr2-dawn-table { width: 100%; border-collapse: separate; border-spacing: 0 5px; font-size: 11px; }
    .ldr2-dawn-table thead th {
      text-align: center; font-size: 9.5px; font-weight: 700; color: #9E8E80; padding: 0 2px 6px;
    }
    .ldr2-dawn-table thead th small { display: block; font-size: 9px; font-weight: 400; margin-top: 1px; }
    .ldr2-dawn-table tbody td {
      padding: 7px 2px; text-align: center; background: #FAFAF8;
      border-top: 1.5px solid #E6DDD4; border-bottom: 1.5px solid #E6DDD4;
    }
    .ldr2-dawn-table tbody td:first-child {
      border-left: 1.5px solid #E6DDD4; border-radius: 10px 0 0 10px; padding-left: 7px;
    }
    .ldr2-dawn-table tbody td:last-child {
      border-right: 1.5px solid #E6DDD4; border-radius: 0 10px 10px 0; padding-right: 5px;
    }
    .ldr2-row-label { font-size: 9.5px; font-weight: 700; color: #9E8E80; white-space: nowrap; }
    .ldr2-chip {
      display: inline-block; padding: 3px 6px; border-radius: 9px;
      font-size: 10px; font-weight: 700; line-height: 1.4; box-shadow: 1px 2px 0 rgba(0,0,0,.08);
    }
    .ldr2-chip-pastor { background: #FDEDF0; border: 1.5px solid #F2889A; color: #C2185B; }
    .ldr2-chip-sermon { background: #FFFAED; border: 1.5px solid #F5C842; color: #C77800; }
    .ldr2-chip-sub    { background: #F0EDFA; border: 1.5px solid #9B8EC4; color: #512DA8; }
    .ldr2-chip-plain  { background: #F5F3F0; border: 1.5px solid #DDD8D0; color: #5A4E44; }
    .ldr2-divider { text-align: center; font-size: 18px; letter-spacing: 10px; margin: 6px 0; opacity: .55; user-select: none; }
    .ldr2-worship-grid { display: flex; gap: 10px; }
    .ldr2-worship-card {
      flex: 1; background: var(--white); border-radius: 18px; overflow: hidden;
      box-shadow: 0 6px 24px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
    }
    .ldr2-worship-head { padding: 12px 12px 10px; }
    .ldr2-worship-head.wed { background: linear-gradient(140deg,#EAF4FC,#F3F8FF); border-bottom: 2px dashed #BEE0F8; }
    .ldr2-worship-head.fri { background: linear-gradient(140deg,#FFF8E8,#FFFDF5); border-bottom: 2px dashed #FFDFAA; }
    .ldr2-worship-icon { font-size: 24px; margin-bottom: 4px; }
    .ldr2-worship-title { font-size: 13px; font-weight: 700; }
    .ldr2-worship-date  { font-size: 10px; color: #9E8E80; margin-top: 2px; }
    .ldr2-worship-body { padding: 8px 10px; }
    .ldr2-role-row { display: flex; align-items: center; gap: 7px; padding: 5px 0; border-bottom: 1.5px dashed #F0EDE8; }
    .ldr2-role-row:last-child { border-bottom: none; }
    .ldr2-role-tag {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 7px;
      background: #FFF3E0; border: 1.5px solid #FFCC80; color: #E65100;
      white-space: nowrap; flex-shrink: 0; box-shadow: 1px 2px 0 rgba(230,81,0,.12);
    }
    .ldr2-role-val { font-size: 13px; font-weight: 700; }
    .ldr2-prayer-box {
      margin: 0 10px 10px; background: #FFFAED; border: 2px dashed #F5C842;
      border-radius: 12px; padding: 8px 10px;
    }
    .ldr2-prayer-title { font-size: 10px; font-weight: 700; color: #C77800; margin-bottom: 6px; }
    .ldr2-prayer-title::before { content: '🙏 '; }
    .ldr2-prayer-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .ldr2-prayer-tag {
      background: var(--white); border: 1.5px solid #F5C842; color: #3A2E26;
      font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
      box-shadow: 1px 2px 0 rgba(245,200,66,.25);
    }
    .ldr2-footer {
      text-align: center; margin-top: 8px; padding: 14px; background: var(--white);
      border-radius: 16px; font-size: 10.5px; color: #9E8E80;
      box-shadow: 0 4px 16px rgba(0,0,0,.04); line-height: 1.9;
    }

    /* ── COLORS APPLIED ── */
    .sun-color  { color: var(--sun); }
    .wed-color  { color: var(--wed); }
    .fri-color  { color: var(--fri); }
    .qt-color   { color: var(--qt); }
    .ldr-color  { color: var(--ldr); }

    @media (max-width: 360px) {
      .menu-grid { gap: 9px; }
      .menu-card { padding: 15px 12px; }
      .menu-card .m-icon { font-size: 26px; }
      .menu-card .m-title { font-size: 13px; }
      .detail-title { font-size: 19px; }
      .qt-card-head { padding: 18px 16px 14px; }
    }

// ══════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════

const stack = [];
const todayStr = new Date().toISOString().slice(0,10);

function goTo(id) {
  const prev = stack.length ? stack[stack.length-1] : 'home';
  const prevEl = document.getElementById('s-' + prev);
  const nextEl = document.getElementById('s-' + id);

  prevEl.classList.add('behind');
  nextEl.classList.add('active');
  stack.push(id);
  updateHeader(id);

  // Render on first visit
  const fn = renderers[id];
  if (fn && !nextEl.dataset.rendered) { fn(); nextEl.dataset.rendered = '1'; }
}

function goBack() {
  if (!stack.length) return;
  const cur = stack.pop();
  const prev = stack.length ? stack[stack.length-1] : 'home';
  document.getElementById('s-' + cur).classList.remove('active');
  document.getElementById('s-' + prev).classList.remove('behind');
  updateHeader(prev);
}

const TITLES = {
  home:'', sunday:'☀️ 주일예배', wednesday:'🕊 수요예배',
  friday:'🔥 금요성령집회', qt:'📖 큐티 본문', leaders:'👥 한 주간 담당자', detail:'',
};
const SUBS = {
  home:'', sunday:'요한복음 강해', wednesday:'SBA 성서학 과정3',
  friday:'사무엘상 강해', qt:'5월 · 6월 큐티 일정', leaders:'이번 주 예배 담당자', detail:'',
};

function updateHeader(id) {
  const isHome = !stack.length || id === 'home';
  document.getElementById('backBtn').classList.toggle('visible', !isHome);
  document.getElementById('hTitle').textContent = TITLES[id] || '✝ 성민교회';
  document.getElementById('hSub').textContent   = SUBS[id]   || '';
}

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════

function dateInfo(dateStr) {
  const d = new Date(dateStr);
  return { m: d.getMonth()+1, day: d.getDate(), dow: KDOW[d.getDay()] };
}

function isPast(dateStr)  { return dateStr < todayStr; }
function isNow(dateStr)   {
  const d = new Date(dateStr); const t = new Date(todayStr);
  return Math.abs(d - t) < 7 * 86400000;
}

  sunday:    renderSunday,
  wednesday: renderWednesday,
  friday:    renderFriday,
  leaders:   renderLeaders,

// ── DETAIL ────────────────────────────────────
function showDetail(type, idx) {
  let data, color, colorBg, colorLight;
  if (type === 'sunday') {
    data = sundayData[idx]; color = '--sun'; colorBg = '--sun-bg'; colorLight = '--sun-light';
  } else if (type === 'wednesday') {
    data = wednesdayData[idx]; color = '--wed'; colorBg = '--wed-bg'; colorLight = '--wed-light';
  } else {
    data = fridayData[idx]; color = '--fri'; colorBg = '--fri-bg'; colorLight = '--fri-light';
  }

  const {m, day, dow} = dateInfo(data.date);
  const el = document.getElementById('s-detail');

  let staffHtml = '';
  if (type === 'sunday') {
    if (data.staff) {
      const rows = Object.entries(data.staff).map(([r,n]) =>
        `<div class="staff-row"><span class="s-role">${r}</span><span class="s-name">${n}</span></div>`
      ).join('');
      staffHtml = `<div class="detail-sec">
        <div class="sec-label">예배 담당자</div>
        <div class="staff-grid">${rows}</div>
      </div>`;
    } else {
      staffHtml = `<div class="detail-sec"><div class="no-staff">담당자 정보가 준비되지 않았습니다.</div></div>`;
    }
  } else if (type === 'wednesday') {
    staffHtml = `<div class="detail-sec">
      <div class="sec-label">예배 담당자</div>
      <div class="staff-grid">
        <div class="staff-row"><span class="s-role">설교</span><span class="s-name">${data.preacher}</span></div>
        <div class="staff-row"><span class="s-role">찬양</span><span class="s-name">${data.worship}</span></div>
        <div class="staff-row"><span class="s-role">음향</span><span class="s-name">${data.sound}</span></div>
        <div class="staff-row"><span class="s-role">PD</span><span class="s-name">${data.pd}</span></div>
      </div>
    </div>`;
  } else {
    const tags = data.prayer.split(' ').map(p =>
      `<span class="p-tag" style="background:var(${colorBg});color:var(${color});border:1px solid var(${colorLight})">${p}</span>`
    ).join('');
    staffHtml = `<div class="detail-sec">
      <div class="sec-label">예배 담당자</div>
      <div class="staff-grid">
        <div class="staff-row"><span class="s-role">찬양</span><span class="s-name">${data.worship}</span></div>
        <div class="staff-row"><span class="s-role">PD</span><span class="s-name">${data.pd}</span></div>
        <div class="staff-row"><span class="s-role">자막</span><span class="s-name">${data.caption}</span></div>
      </div>
      <div style="margin-top:10px">
        <div class="sec-label">기도용사</div>
        <div class="prayer-tags">${tags}</div>
      </div>
    </div>`;
  }

  TITLES.detail = data.title || data.subject || '';
  SUBS.detail   = `${m}월 ${day}일 ${dow}요일`;
  el.dataset.rendered = '';

  el.innerHTML = `
    <div class="detail-wrap">
      <div class="detail-hero" style="border-top:4px solid var(${color})">
        <div class="detail-date">${m}월 ${day}일 (${dow}) ${type==='wednesday'?data.lec+'강':''}</div>
        <div class="detail-title">${data.title || data.subject}</div>
        <span class="passage-pill" style="background:var(${colorBg});color:var(${color});border:1px solid var(${colorLight})">
          📖 ${data.passage || data.subject}
        </span>
      </div>
      ${staffHtml}
    </div>`;

  const prev = stack.length ? stack[stack.length-1] : 'home';
  document.getElementById('s-' + prev).classList.add('behind');
  el.classList.add('active');
  stack.push('detail');
  updateHeader('detail');
  document.getElementById('hTitle').textContent = data.title || data.subject || '';
  document.getElementById('hSub').textContent = `${m}월 ${day}일 ${dow}요일`;
}

function renderQT() {
  const rows = qtData.map(d => {
    const isSun = d.dow === '주';

    return `<div class="svc-item${past && !isToday ? ' is-past' : ''}${isToday ? ' is-now' : ''}" style="${isToday ? 'border-color:var(--qt)' : ''}">

}

// ── LEADERS ───────────────────────────────────
function renderLeaders() {

  function chipP(name) {
    const cls = name === '목사님' ? 'ldr2-chip-pastor' : 'ldr2-chip-sermon';
    return `<span class="ldr2-chip ${cls}">${name}</span>`;

    const dt = new Date(startDate); dt.setDate(sd + i);
    return `<th>${d}<small>${dt.getDate()}일</small></th>`;

  const pRow = L.dawn.preacher.map(v => `<td>${chipP(v)}</td>`).join('');
  const cRow = L.dawn.caption.map(v => `<td><span class="ldr2-chip ldr2-chip-sub">${v}</span></td>`).join('');
  const aRow = L.dawn.accomp.map(v => `<td><span class="ldr2-chip ldr2-chip-plain">${v}</span></td>`).join('');
  const pTags = L.fri.prayer.map(p => `<span class="ldr2-prayer-tag">${p}</span>`).join('');

  const dateLabel = sm === em

    : `${year}년 ${sm}월 ${sd}일 — ${em}월 ${ed}일`;

  document.getElementById('s-leaders').innerHTML = `
    <div class="ldr2-wrap">

      <div class="ldr2-card">
        <div class="ldr2-sec-head">
          <div class="ldr2-sec-icon green">🌅</div>

        <table class="ldr2-dawn-table">

              <th style="width:34px"></th>
              ${dayHeaders}

          </thead>
          <tbody>
            <tr>
              <td><span class="ldr2-row-label">설교</span></td>
              ${pRow}
            </tr>
            <tr>
              <td><span class="ldr2-row-label">자막</span></td>
              ${cRow}
            </tr>
            <tr>
              <td><span class="ldr2-row-label">반주</span></td>
              ${aRow}
            </tr>
          </tbody>
        </table>
      </div>

      <div class="ldr2-divider">🍃 🌿 🍃</div>

      <div class="ldr2-worship-grid">
        <div class="ldr2-worship-card">
          <div class="ldr2-worship-head wed">
            <div class="ldr2-worship-icon">🕊️</div>
            <div class="ldr2-worship-title">수요예배</div>
            <div class="ldr2-worship-date">${L.wed.date}</div>
          </div>
          <div class="ldr2-worship-body">
            <div class="ldr2-role-row"><span class="ldr2-role-tag">설교</span><span class="ldr2-role-val">${L.wed.preacher}</span></div>
            <div class="ldr2-role-row"><span class="ldr2-role-tag">찬양</span><span class="ldr2-role-val">${L.wed.worship}</span></div>
            <div class="ldr2-role-row"><span class="ldr2-role-tag">음향</span><span class="ldr2-role-val">${L.wed.sound}</span></div>
            <div class="ldr2-role-row"><span class="ldr2-role-tag">PD</span><span class="ldr2-role-val">${L.wed.pd}</span></div>
          </div>
        </div>

        <div class="ldr2-worship-card">

            <div class="ldr2-worship-date">${L.fri.date}</div>
          </div>
          <div class="ldr2-worship-body">
            <div class="ldr2-role-row"><span class="ldr2-role-tag">찬양</span><span class="ldr2-role-val">${L.fri.worship}</span></div>
